<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basic Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="calculator" aria-label="Calculator">
        <header class="display" aria-live="polite">
          <p id="previous-operand" class="previous-operand">&nbsp;</p>
          <p id="current-operand" class="current-operand">0</p>
        </header>

        <div class="keys" role="group" aria-label="Calculator keys">
          <button class="key key-utility" data-action="clear">AC</button>
          <button class="key key-utility" data-action="delete">DEL</button>
          <button class="key key-utility" data-action="percent">%</button>
          <button class="key key-operator" data-action="operation" data-value="/">/</button>

          <button class="key" data-action="digit" data-value="7">7</button>
          <button class="key" data-action="digit" data-value="8">8</button>
          <button class="key" data-action="digit" data-value="9">9</button>
          <button class="key key-operator" data-action="operation" data-value="*">x</button>

          <button class="key" data-action="digit" data-value="4">4</button>
          <button class="key" data-action="digit" data-value="5">5</button>
          <button class="key" data-action="digit" data-value="6">6</button>
          <button class="key key-operator" data-action="operation" data-value="-">-</button>

          <button class="key" data-action="digit" data-value="1">1</button>
          <button class="key" data-action="digit" data-value="2">2</button>
          <button class="key" data-action="digit" data-value="3">3</button>
          <button class="key key-operator" data-action="operation" data-value="+">+</button>

          <button class="key" data-action="toggle-sign">+/-</button>
          <button class="key" data-action="digit" data-value="0">0</button>
          <button class="key" data-action="decimal">.</button>
          <button class="key key-equals" data-action="equals">=</button>
        </div>
      </section>
    </main>

    <script src="script.js" defer></script>
  </body>
</html>
